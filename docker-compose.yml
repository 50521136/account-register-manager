services:
  account-register-manager:
    build: .
    image: account-register-manager:latest
    container_name: account-register-manager
    restart: unless-stopped
    ports:
      - "8010:8010"
    environment:
      ACCOUNT_REGISTER_AUTH_KEY: "${ACCOUNT_REGISTER_AUTH_KEY:-}"
      ACCOUNT_REGISTER_FLARESOLVERR_ENABLED: "${ACCOUNT_REGISTER_FLARESOLVERR_ENABLED:-}"
      ACCOUNT_REGISTER_FLARESOLVERR_URL: "${ACCOUNT_REGISTER_FLARESOLVERR_URL:-}"
      ACCOUNT_REGISTER_FLARESOLVERR_TIMEOUT_SECONDS: "${ACCOUNT_REGISTER_FLARESOLVERR_TIMEOUT_SECONDS:-}"
      ACCOUNT_REGISTER_FLARESOLVERR_REFRESH_INTERVAL_SECONDS: "${ACCOUNT_REGISTER_FLARESOLVERR_REFRESH_INTERVAL_SECONDS:-}"
    volumes:
      - ./config.json:/app/config.json
      - ./data:/app/data

  flaresolverr:
    profiles: ["flaresolverr"]
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: account-register-manager-flaresolverr
    restart: unless-stopped
    environment:
      LOG_LEVEL: "${FLARESOLVERR_LOG_LEVEL:-info}"
      TZ: "${TZ:-Asia/Shanghai}"
    ports:
      - "127.0.0.1:${FLARESOLVERR_PORT:-8191}:8191"
